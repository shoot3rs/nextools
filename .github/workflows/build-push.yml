name: Build and Push Docker Image

on:
  workflow_run:
    workflows: [ "Buf CI" ]
    types: [ completed ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # e.g., ghcr.io/charmmtech/<repo>
  DOCKERFILE: Dockerfile
  CONTEXT: . # build context (adjust if needed)

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Git SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            --secret id=buf_token,env=BUF_TOKEN \
            -f ${{ env.DOCKERFILE }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.CONTEXT }}
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
